extract_data:
  description: >
    You are working with dataset "{dataset_name}".
    Dataset description: {dataset_description}
    Allowed tables: {allowed_tables}
    Schema snapshot:
    {schema_summary}

    First inspect the available tables and schema, then write the minimum SQL needed to answer:
    {query}

    Do not use tables outside the allowed list.
    If the question cannot be answered from the current dataset, say what is missing.
  expected_output: >
    The SQL result needed to answer the question.
  agent: sql_dev

analyze_data:
  description: >
    Based only on the extracted data for dataset "{dataset_name}", answer the user question:
    {query}

    Requirements:
    - Write in Vietnamese
    - Start with a direct answer
    - Include the key numbers
    - Keep it concise and business-friendly
  expected_output: >
    A concise Vietnamese answer with the key findings.
  agent: data_analyst
  context: [extract_data]

write_report:
  description: >
    Turn the analysis into a short summary under 100 words.
  expected_output: >
    A short executive summary.
  agent: report_writer
  context: [analyze_data]
